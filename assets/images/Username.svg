<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Glowing background circle -->
  <circle cx="50" cy="50" r="46" fill="#E0F4FF" stroke="#48CAE4" stroke-width="2"/>
  
  <!-- Star body (yellow gradient) -->
  <defs>
    <linearGradient id="starGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="100%" style="stop-color:#FFA500"/>
    </linearGradient>
  </defs>
  
  <polygon points="50,12 58,35 82,35 63,50 71,73 50,59 29,73 37,50 18,35 42,35" fill="url(#starGrad)" stroke="#FF8C00" stroke-width="2"/>
  
  <!-- Star face -->
  <circle cx="40" cy="44" r="4" fill="#2C1810"/>
  <circle cx="60" cy="44" r="4" fill="#2C1810"/>
  <path d="M40 58 Q50 68 60 58" stroke="#2C1810" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Rosy cheeks -->
  <circle cx="34" cy="52" r="5" fill="#FFB6C1" opacity="0.7"/>
  <circle cx="66" cy="52" r="5" fill="#FFB6C1" opacity="0.7"/>
  
  <!-- Name tag ribbon -->
  <rect x="25" y="75" width="50" height="16" rx="4" fill="#FFB347" stroke="#FF8C00" stroke-width="1.5"/>
  <text x="50" y="87" font-size="10" font-weight="bold" fill="#FFFFFF" text-anchor="middle" font-family="Arial">username</text>
  
  <!-- Little sparkles around -->
  <circle cx="15" cy="25" r="2" fill="#FFD700"/>
  <circle cx="85" cy="30" r="2.5" fill="#FFD700"/>
  <circle cx="20" cy="70" r="1.5" fill="#FFD700"/>
  <circle cx="80" cy="65" r="2" fill="#FFD700"/>
  <circle cx="70" cy="15" r="1.5" fill="#FFD700"/>
</svg>